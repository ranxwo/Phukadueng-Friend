<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Phukadueng Friend Card</title>

<style>

body{
font-family: "Prompt", sans-serif;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
width:600px;
height:340px;
background:#f8f8f8;
border-radius:25px;
padding:25px 30px;
box-shadow:0 8px 18px rgba(0,0,0,0.15);
border-top:6px solid #5b6df6;
position:relative;
}

/* โลโก้ + ชื่อกลุ่ม */

.header{
display:flex;
align-items:center;
gap:4px;
margin-left:-9px;
}

.logo{
width:55px;
}

.group-name{
font-size:22px;
font-weight:600;
color:#294f8b;
}

/* รูปโปรไฟล์ */

.profile{
position:absolute;
top:40px;
right:40px;
}

.profile img{
width:120px;
height:140px;
object-fit:cover;
border-radius:18px;
border:4px solid #e5e5e5;
}

/* ชื่อ */

.name{
margin-top:40px;
font-size:28px;
font-weight:700;
color:#222;
}

.nickname{
color:#6b7cff;
font-weight:600;
margin-bottom:10px;
}

/* ข้อมูล */

.info{
margin-top:10px;
line-height:1.8;
font-size:18px;
}

/* QR Code */

.qr{
position:absolute;
bottom:30px;
right:55px;
}

.qr img{
width:60px;
}

</style>

</head>

<body>

<div class="card">

<div class="header">
<img src="logo.png" class="logo">
<div class="group-name">กลุ่มเพื่อนภูกระดึง</div>
</div>

<div class="profile">
<img src="profile.jpg">
</div>

<div class="name">รวีวรรณ พันธ์สนิท</div>
<div class="nickname">“แตน”</div>

<div class="info">
📞 081-4805-793<br>
💬 rawiwan12345<br>
✉ rawiwan111483@gmail.com
</div>

<div class="qr">
<img src="qr.png">
</div>

</div>

</body>
</html>
