<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Business Card V6</title>

<style>

@page{
size:A4 portrait;
margin:0mm;
}

@media print{
body{margin:0;background:white;}
button{display:none;}
}

body{
font-family:"Sarabun", Arial, sans-serif;
margin:0;
background:#eef2f6;
}

.container{
display:grid;
grid-template-columns:repeat(2,90mm);
grid-auto-rows:54mm;
gap:2mm;
justify-content:center;
}

.container:not(:last-child){
page-break-after:always;
}

.card{
width:90mm;
height:54mm;
padding:6mm;
box-sizing:border-box;
background:white;
border-radius:4mm;
box-shadow:0 1mm 3mm rgba(0,0,0,0.05);

border-top:1.5mm solid #5b6cff;

border-left:0.25mm dashed #bfc7d5;
border-right:0.25mm dashed #bfc7d5;
border-bottom:0.25mm dashed #bfc7d5;

position:relative;
display:flex;
flex-direction:column;
}

.header{
display:flex;
align-items:center;
gap:4mm;
}

.header img{
height:8mm;
}

.group-name{
font-size:14px;
font-weight:700;
color:#1f3b5c;
}

.profile{
position:absolute;
top:6mm;
right:6mm;
width:20mm;
height:20mm;
border-radius:4mm;
overflow:hidden;
border:1mm solid #e5e9f0;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
margin-top:8mm;
display:flex;
flex-direction:column;
}

.fullname{
font-size:17px;
font-weight:700;
color:#1f3b5c;
}

.nickname{
font-size:12px;
color:#666;
margin-bottom:2mm;
font-weight:600;
}

.nickname::before{content:"“";}
.nickname::after{content:"”";}

.detail{
font-size:11px;
margin-bottom:1mm;
display:flex;
align-items:center;
color:#444;
}

.email{
font-size:10px;
}

.icon{
width:12px;
height:12px;
margin-right:5px;
}

.phone-icon{fill:#d62828;}
.line-icon{fill:#06C755;}
.mail-icon{fill:#c98c00;}

.qr{
position:absolute;
right:6mm;
bottom:6mm;
width:10mm;
height:10mm;
}

.qr canvas,
.qr img{
width:100%!important;
height:100%!important;
display:block;
}

button{
position:fixed;
top:20px;
right:20px;
padding:10px 18px;
border:none;
border-radius:8px;
background:#ff7a00;
color:white;
font-size:14px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="printArea"></div>

<button onclick="downloadPDF()">ดาวน์โหลด PDF</button>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>

/* อ่านข้อมูล */

const members = JSON.parse(localStorage.getItem("membersData")) || [];

members.forEach(m=>{

m.fullname =
m.fullname ||
m.name ||
((m.firstName||"") + " " + (m.lastName||"")).trim();

m.nickname = m.nickname || "";
m.phone = m.phone || "";
m.line = m.line || m.lineId || "";
m.email = m.email || "";
m.image = m.image || m.profileImage || "";

});

if(members.length === 0){
document.body.innerHTML="<h2 style='text-align:center'>ไม่มีข้อมูลสำหรับ Export</h2>";
}

/* แปลงลิงก์รูป */

function convertDrive(url){

if(!url) return "https://ui-avatars.com/api/?name=User";

if(url.includes("lh3.googleusercontent.com")){
return url;
}

if(url.includes("drive.google.com")){

let id=null;

if(url.includes("/d/")){
id=url.split("/d/")[1].split("/")[0];
}

if(url.includes("id=")){
id=url.split("id=")[1];
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w400";
}

}

return url;

}

/* สร้างการ์ด */

const printArea=document.getElementById("printArea");

let page;

members.forEach((member,index)=>{

if(index%10===0){
page=document.createElement("div");
page.className="container";
printArea.appendChild(page);
}

const card=document.createElement("div");
card.className="card";

const qrId="qr_"+index;

const imageUrl=convertDrive(member.image);

card.innerHTML=`

<div class="header">
<img src="logo.png">
<div class="group-name">กลุ่มเพื่อนภูกระดึง</div>
</div>

<div class="profile">
<img src="${imageUrl}">
</div>

<div class="info">

<div class="fullname">${member.fullname}</div>

<div class="nickname">${member.nickname}</div>

<div class="detail">
<svg class="icon phone-icon" viewBox="0 0 24 24">
<path d="M6.6 10.8a15.1 15.1 0 006.6 6.6l2.2-2.2a1 1 0 011-.24 11.4 11.4 0 003.6.6 1 1 0 011 1V20a1 1 0 01-1
