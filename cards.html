<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Business Card V5</title>

<style>

@page{
size:A4 portrait;
margin:10mm;
}

@media print{
body{margin:0;background:white;}
button{display:none;}
}

body{
font-family:"Sarabun", Arial, sans-serif;
margin:0;
background:#eef2f6;
}

.container{
display:grid;
grid-template-columns:repeat(2,90mm);
grid-auto-rows:54mm;
gap:6mm;
justify-content:center;
}

.container:not(:last-child){
page-break-after:always;
}

.card{
width:90mm;
height:54mm;
padding:6mm;
box-sizing:border-box;
background:white;
border-radius:4mm;
box-shadow:0 1mm 3mm rgba(0,0,0,0.05);
border-top:1.5mm solid #5b6cff;
position:relative;
display:flex;
flex-direction:column;
}

.header{
display:flex;
align-items:center;
gap:4mm;
}

.header img{
height:8mm;
}

.group-name{
font-size:14px;
font-weight:700;
color:#1f3b5c;
}

.profile{
position:absolute;
top:6mm;
right:6mm;
width:20mm;
height:20mm;
border-radius:4mm;
overflow:hidden;
border:1mm solid #e5e9f0;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
margin-top:8mm;
display:flex;
flex-direction:column;
}

.fullname{
font-size:17px;
font-weight:700;
color:#1f3b5c;
}

.nickname{
font-size:12px;
color:#666;
margin-bottom:2mm;
font-weight:600;
}

.nickname::before{content:"“";}
.nickname::after{content:"”";}

.detail{
font-size:11px;
margin-bottom:1mm;
display:flex;
align-items:center;
color:#444;
}

.email{
font-size:10px;
}

.icon{
width:12px;
height:12px;
margin-right:5px;
}

.phone-icon{fill:#d62828;}
.line-icon{fill:#06C755;}
.mail-icon{fill:#c98c00;}

.qr{
position:absolute;
right:6mm;
bottom:6mm;
width:10mm;
height:10mm;
}

.qr canvas,
.qr img{
width:100%!important;
height:100%!important;
display:block;
}

</style>
</head>

<body>

<div id="printArea"></div>

<br>

<button onclick="window.print()">Print PDF</button>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>

/* อ่านข้อมูล */

const members = JSON.parse(localStorage.getItem("membersData")) || [];
  members.forEach(m=>{
m.nickname = m.nickname || "";
m.phone = m.phone || "";
m.line = m.line || m.lineId || "";
m.email = m.email || "";
m.image = m.image || m.profileImage || "";
});

if(members.length === 0){
document.body.innerHTML="<h2 style='text-align:center'>ไม่มีข้อมูลสำหรับ Export</h2>";
}

/* แปลงลิงก์รูป */

function convertDrive(url){

if(!url) return "https://ui-avatars.com/api/?name=User";

if(url.includes("lh3.googleusercontent.com")){
return url;
}

if(url.includes("drive.google.com")){

let id=null;

if(url.includes("/d/")){
id=url.split("/d/")[1].split("/")[0];
}

if(url.includes("id=")){
id=url.split("id=")[1];
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w400";
}

}

return url;

}

/* สร้างการ์ด */

const printArea=document.getElementById("printArea");

let page;

members.forEach((member,index)=>{

if(index%4===0){
page=document.createElement("div");
page.className="container";
printArea.appendChild(page);
}

const card=document.createElement("div");
card.className="card";

const qrId="qr_"+index;

const imageUrl=convertDrive(member.image);

card.innerHTML=`

<div class="header">
<img src="logo.png">
<div class="group-name">กลุ่มเพื่อนภูกระดึง</div>
</div>

<div class="profile">
<img src="${imageUrl}">
</div>

<div class="info">

<div class="fullname">${member.fullname||""}</div>

<div class="nickname">${member.nickname||""}</div>

<div class="detail">
<svg class="icon phone-icon" viewBox="0 0 24 24">
<path d="M6.6 10.8a15.1 15.1 0 006.6 6.6l2.2-2.2a1 1 0 011-.24 11.4 11.4 0 003.6.6 1 1 0 011 1V20a1 1 0 01-1 1C10.5 21 3 13.5 3 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.2.2 2.4.6 3.6a1 1 0 01-.25 1z"/>
</svg>
${member.phone||""}
</div>

<div class="detail">
<svg class="icon line-icon" viewBox="0 0 24 24">
<path d="M12 2C6.5 2 2 5.7 2 10.3c0 4 3.2 7.3 7.5 8l-.4 2.7c-.1.5.4.8.8.5l3.2-2.3c5.1-.2 9-3.8 9-8.9C22 5.7 17.5 2 12 2z"/>
</svg>
${member.line||""}
</div>

<div class="detail email">
<svg class="icon mail-icon" viewBox="0 0 24 24">
<path d="M2 6l10 7 10-7v12H2z"/>
</svg>
${member.email||""}
</div>

</div>

<div id="${qrId}" class="qr"></div>

`;

page.appendChild(card);

new QRCode(document.getElementById(qrId),{
text:"https://line.me/ti/p/~"+(member.line||""),
width:200,
height:200
});

});

</script>

</body>
</html>
